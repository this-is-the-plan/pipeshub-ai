[pytest]
minversion = 7.0

# Only look for tests inside this integration-tests package
testpaths =
    messaging
    connectors
    storage

# Match our test file naming patterns
python_files = integration_test_*.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: marks tests as integration tests (require external services)
    asyncio: marks tests as asyncio-based tests
    slow: marks tests as slow (deselect with '-m "not slow"')
    s3: marks tests specific to S3 connector
    gcs: marks tests specific to GCS connector
    azure_blob: marks tests specific to Azure Blob connector
    azure_files: marks tests specific to Azure Files connector
    storage: marks tests specific to Storage service
    confluence: marks tests specific to Confluence connector
    order: marks test execution order

# Output settings
# pytest-order defaults to session scope: all order(1) tests across every file run first,
# then all order(2), etc. That interleaves S3/GCS/Azure Blob/Azure Files and keeps four
# module-scoped connector fixtures alive at once (heavy sync/graph load → timeouts).
# Module scope = finish one connector file (order 1→5) before the next, like -m azure_blob.
addopts =
    -v
    --tb=long
    --strict-markers
    --order-scope=module

# Async mode for pytest-asyncio
asyncio_mode = auto
# Session scope needed for session-scoped async graph_provider fixture
asyncio_default_fixture_loop_scope = session

# Log settings
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
