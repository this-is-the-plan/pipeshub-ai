name: CI / CD

on:
  push:
    branches: [development]

jobs:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-new/package-lock.json
      - run: cd frontend-new && npm ci
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: 'https://demo.pipeshub.com'
        run: cd frontend-new && npm run build
      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: frontend-new/out
          key: build-${{ github.sha }}

  # ── 2. Test ─────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-new/package-lock.json
      - run: cd frontend-new && npm ci
      - run: cd frontend-new && npm test -- --passWithNoTests

  # ── 3. Lint ─────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-new/package-lock.json
      - run: cd frontend-new && npm ci
      - run: cd frontend-new && npm run lint

  # ── 4. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: frontend-new/out
          key: build-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Deploy to S3
        run: aws s3 cp frontend-new/out/ s3://pipeshub-ui.kagha.ai/ --recursive